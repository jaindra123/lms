; Moodle on DDEV: long scripts (upgrade, purge caches) and OPcache.
max_execution_time = 900
max_input_time = 900
memory_limit = 512M
default_socket_timeout = 300
realpath_cache_size = 16M
realpath_cache_ttl = 600

[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
; Faster dev: do not re-stat thousands of PHP files on the Windows bind mount each request.
; Re-check PHP files on each request so plugin fixes apply without restarting FPM.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
