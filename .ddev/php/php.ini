; Moodle on DDEV: long scripts (upgrade, purge caches) and OPcache.
max_execution_time = 900
max_input_time = 900
memory_limit = 512M
default_socket_timeout = 300

[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
; Faster dev: do not re-stat thousands of PHP files on the Windows bind mount each request.
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
